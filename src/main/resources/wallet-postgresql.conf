#------------------------------------------------------------------------------
# CONNECTIONS AND AUTHENTICATION
#------------------------------------------------------------------------------
listen_addresses = '*'
port = 5432
max_connections = 100
superuser_reserved_connections = 3

#------------------------------------------------------------------------------
# MEMORY SETTINGS (16GB RAM)
#------------------------------------------------------------------------------
shared_buffers = 4GB           # 25% от ОЗУ
effective_cache_size = 12GB    # 75% от ОЗУ
work_mem = 32MB                # на операцию сортировки/хеша
maintenance_work_mem = 512MB   # для VACUUM, CREATE INDEX
huge_pages = try               # на Windows эффект незначительный, но можно оставить try

#------------------------------------------------------------------------------
# WRITE-AHEAD LOG (WAL) - КРИТИЧЕСКИ ВАЖНО ДЛЯ СКОРОСТИ ЗАПИСИ
#------------------------------------------------------------------------------
wal_level = replica            # минимально необходимый для репликации (если не нужна - можно minimal)
wal_buffers = 64MB             # буфер в памяти для WAL
wal_writer_delay = 200ms       # частота сброса WAL-буфера
wal_writer_flush_after = 1MB   # сброс на диск после 1MB накопленных данных (для NVMe)
wal_compression = on           # экономит место и I/O
wal_log_hints = on             # помогает при PITR, добавляет немного нагрузки
wal_sync_method = open_datasync   # для Windows оптимальный метод

# Размеры WAL (пространство на диске)
max_wal_size = 8GB
min_wal_size = 2GB

# --------------------------- КЛЮЧЕВЫЕ ПАРАМЕТРЫ ПРОИЗВОДИТЕЛЬНОСТИ ---------------------------
synchronous_commit = off       # ОГРОМНЫЙ ПРИРОСТ ПРОИЗВОДИТЕЛЬНОСТИ. Риск: потеря последних транзакций при сбое питания.
full_page_writes = off         # ОТКЛЮЧИТЬ ТОЛЬКО ДЛЯ НАДЕЖНОГО ОБОРУДОВАНИЯ (NVMe с защитой от сбоев питания). Ускоряет запись до 2-3 раз.
# ------------------------------------------------------------------------------------------

#------------------------------------------------------------------------------
# CHECKPOINTS (контрольные точки)
#------------------------------------------------------------------------------
checkpoint_timeout = 15min
checkpoint_completion_target = 0.9   # растягиваем запись на 90% интервала
checkpoint_flush_after = 256kB       # принудительный сброс после 256KB (снижает нагрузку на фоновую запись)

#------------------------------------------------------------------------------
# BACKGROUND WRITER (фоновый писатель)
#------------------------------------------------------------------------------
bgwriter_delay = 200ms
bgwriter_lru_maxpages = 100
bgwriter_lru_multiplier = 2.0
bgwriter_flush_after = 256kB         # сброс после 256KB записанных страниц
#------------------------------------------------------------------------------
# PARALLEL QUERIES (используется только при сложных select, но для фоновых задач полезно)
#------------------------------------------------------------------------------
max_worker_processes = 8
max_parallel_workers = 8
max_parallel_workers_per_gather = 2

#------------------------------------------------------------------------------
# QUERY TUNING (для стабильности планировщика)
#------------------------------------------------------------------------------
enable_parallel_append = on
enable_parallel_hash = on
random_page_cost = 1.0               # очень низкое значение для NVMe (быстрый произвольный доступ)
seq_page_cost = 1.0                  # последовательное чтение тоже дешево
effective_io_concurrency = 200       # для NVMe можно высокое значение

#------------------------------------------------------------------------------
# LOGGING (минимальное для нагрузки, чтобы не тратить I/O)
#------------------------------------------------------------------------------
log_destination = 'stderr'
logging_collector = on
log_directory = 'log'
log_filename = 'postgresql-%Y-%m-%d_%H%M%S.log'
log_rotation_age = 1d
log_rotation_size = 100MB
log_min_messages = warning
log_min_error_statement = error
log_line_prefix = '%t [%p]: [%l-1] user=%u,db=%d,app=%a,client=%h '

# Отключаем ненужные логи для максимальной производительности
log_statement = 'none'
log_checkpoints = off
log_connections = off
log_disconnections = off
log_lock_waits = off
log_temp_files = -1
#------------------------------------------------------------------------------
# AUTOVACUUM (должен быть включён, но с умеренными настройками)
#------------------------------------------------------------------------------
autovacuum = on
autovacuum_vacuum_threshold = 1000
autovacuum_analyze_threshold = 500
autovacuum_vacuum_scale_factor = 0.05
autovacuum_analyze_scale_factor = 0.02
autovacuum_vacuum_cost_delay = 2ms    # менее агрессивно для NVMe (можно даже 0)
autovacuum_vacuum_cost_limit = 1000
autovacuum_naptime = 30s

#------------------------------------------------------------------------------
# RESOURCE USAGE (для Windows)
#------------------------------------------------------------------------------
max_files_per_process = 1000
shared_preload_libraries = ''         # не загружаем лишнего для чистоты теста

#------------------------------------------------------------------------------
# STATISTICS (минимально, чтобы не отнимать ресурсы)
#------------------------------------------------------------------------------
track_activities = on
track_counts = on
track_io_timing = off                 # отключаем для максимальной производительности
track_functions = none
