spring.application.name=wallet-service

# =============================================================================
# SERVER (Embedded Tomcat)
# =============================================================================
server.port=8080
server.tomcat.threads.max=250
server.tomcat.threads.min-spare=25
server.tomcat.max-connections=10000
server.tomcat.accept-count=1000
server.tomcat.keep-alive-timeout=20000
server.tomcat.max-keep-alive-requests=100
server.tomcat.connection-timeout=20000

# =============================================================================
# DATASOURCE / HIKARI CP
# =============================================================================
spring.datasource.url=jdbc:postgresql://db:5432/walletdb
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

spring.datasource.hikari.data-source-properties.prepareThreshold=3
spring.datasource.hikari.data-source-properties.preferQueryMode=extended
spring.datasource.hikari.data-source-properties.reWriteBatchedInserts=true
spring.datasource.hikari.data-source-properties.logStatementCacheSize=500
spring.datasource.hikari.data-source-properties.logUnclosedConnections=true

spring.datasource.hikari.pool-name=WalletHikariPool
spring.datasource.hikari.maximum-pool-size=17
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.validation-timeout=1000
spring.datasource.hikari.leak-detection-threshold=60000
spring.datasource.hikari.auto-commit=true
spring.datasource.hikari.register-mbeans=true

# =============================================================================
# JPA / HIBERNATE
# =============================================================================
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=validate

spring.jpa.properties.hibernate.jdbc.batch_size=100
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true

spring.jpa.properties.hibernate.generate_statistics=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# =============================================================================
# SPRING TRANSACTIONS
# =============================================================================
spring.transaction.default-timeout=5s

# =============================================================================
# LIQUIBASE
# =============================================================================
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml

# =============================================================================
# LOGGING
# =============================================================================
logging.level.root=INFO
logging.level.com.zaxxer.hikari=INFO
logging.level.org.hibernate.SQL=OFF
logging.level.org.springframework.web=INFO

# =============================================================================
# SERVER COMPRESSION
# =============================================================================
server.compression.enabled=true
server.compression.min-response-size=1024